[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "target-cli"
version = "0.1.0"
description = "CLI interface for Target (browser automation)"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "cli-tools-shared",
    "playwright>=1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
"target" = "target_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["target_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
