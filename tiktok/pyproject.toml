[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tiktok-cli"
version = "0.1.0"
description = "TikTok transcript downloader using yt-dlp"
requires-python = ">=3.11"
dependencies = [
    "cli-tools-shared",
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
tiktok = "tiktok_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["tiktok_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
