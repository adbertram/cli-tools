[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "medium-cli"
version = "0.1.0"
description = "Create Medium drafts through Medium's web composer"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "cli-tools-shared",
]

[project.scripts]
medium = "medium_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["medium_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
