[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wordpress-cli"
version = "0.1.0"
description = "CLI interface for Wordpress API"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "pydantic>=2.0.0",
    "markdown>=3.5.0",
    "mammoth>=1.6.0",
    "python-docx>=1.0.0",
    "beautifulsoup4>=4.12.0",
    "cli-tools-shared",
]

[project.scripts]
wordpress = "wordpress_cli.main:app"

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["wordpress_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
