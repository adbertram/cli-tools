[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "monarch-cli"
version = "0.1.0"
description = "CLI interface for Monarch API"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "monarchmoneycommunity>=1.2.0",
    "gql>=4.0",  # Required by monarchmoneycommunity
    "cli-tools-shared",
]

[project.scripts]
monarch = "monarch_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["monarch_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
