[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "powerpoint-slide-recorder-cli"
version = "0.1.0"
description = "Record narrated PowerPoint slides"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "cli-tools-shared",
]

[project.scripts]
powerpoint-slide-recorder = "powerpoint_slide_recorder_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["powerpoint_slide_recorder_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
