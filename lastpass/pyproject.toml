[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lastpass-cli"
version = "0.1.0"
description = "CLI wrapper for lpass"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "cli-tools-shared",
]

[project.scripts]
lastpass = "lastpass_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["lastpass_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
