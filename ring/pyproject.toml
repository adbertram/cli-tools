[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ring-cli"
version = "0.1.0"
description = "CLI interface for Ring devices via python-ring-doorbell"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "pydantic>=2.0.0",
    "ring-doorbell>=0.9.14",
    "cli-tools-shared",
]

[project.scripts]
ring = "ring_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["ring_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
