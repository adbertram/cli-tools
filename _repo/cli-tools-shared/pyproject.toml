[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-tools-shared"
version = "0.2.0"
description = "Shared authentication, profiles, and output utilities for CLI tools (browser-harness backed)"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0.0",
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "requests>=2.28.0",
    "cdp-use==1.4.5",
    "fetch-use==0.4.0",
    "pillow==12.2.0",
    "websockets==15.0.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["cli_tools_shared*", "browser_harness*"]

[tool.setuptools.package-data]
browser_harness = ["LICENSE"]
