# CLI-tools Keychain item access policy.
#
# Format:
#   keychain <absolute-path-or-~/path>
#   service cli-tools
#   target <secret-name-or-*>
#   allow-process <partition-id> <absolute-process-or-app-path>
#
# The apply script writes the partition IDs from allow-process records to each
# target generic-password item. macOS enforces those partition IDs, while the
# process path keeps this policy reviewable by humans.

keychain ~/.local/share/cli-tools/cli-tools.keychain-db
service cli-tools
target *

# /usr/bin/security is the binary used by _repo/_secret-manager/secrets.sh.
allow-process apple-tool: /usr/bin/security

# Apple-signed shell/runtime callers, including launchd-started bash wrappers.
allow-process apple: /bin/bash

# Signed Codex app runtime. Configure n8n Codex nodes to use this binary path
# instead of the unsigned Homebrew codex shim.
allow-process teamid:2DC432GLL2 /Applications/Codex.app/Contents/Resources/codex
allow-process teamid:2DC432GLL2 /Applications/Codex.app/Contents/Resources/node
