[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
# -r fEs ensures failed, errors, and skipped tests are shown in summary (even in quiet mode)
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -r fEs

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring authenticated CLI
    unit: marks unit tests (fast, no external calls)
