[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "{{name}}-cli"
version = "0.1.0"
description = "CLI wrapper for {{cli_command}}"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "cli-tools-shared",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
"{{name}}" = "{{name_underscore}}_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["{{name_underscore}}_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
