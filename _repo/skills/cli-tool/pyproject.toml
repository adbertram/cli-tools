[project]
name = "cli-tool-tests"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.1.0",
    "pytest-xdist>=3.3.0",
    "cli-tools-shared",
]

[tool.setuptools]
py-modules = ["cli_test_utils"]
packages = ["tests"]

[tool.uv.sources]
cli-tools-shared = { path = "../../cli-tools-shared", editable = true }
