[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shopsalvationarmy-cli"
version = "0.1.0"
description = "CLI interface for Shop The Salvation Army auction site"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "cli-tools-shared",
]

[project.scripts]
shopsalvationarmy = "shopsalvationarmy_cli.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["shopsalvationarmy_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
