[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shopgoodwill-cli"
version = "0.1.0"
description = "CLI interface for ShopGoodwill"
requires-python = ">=3.11"
dependencies = [
    "cli-tools-shared",
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "pycryptodomex>=3.20.0",
]

[project.scripts]
shopgoodwill = "shopgoodwill_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["shopgoodwill_cli*"]

[tool.uv.sources]
cli-tools-shared = { path = "../_repo/cli-tools-shared", editable = true }
